name: Build builder image

# Rebuild the pre-baked Wii U toolchain image whenever the Dockerfile changes,
# or trigger manually when devkitpro packages need a refresh.
on:
  push:
    paths:
      - .github/Dockerfile
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/build-push-action@v5
        with:
          context: .github
          file: .github/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/spotify-wiiu-builder:latest
