name: Sync Stamps

on:
  schedule:
    - cron: '0 */6 * * *'
  repository_dispatch:
    types: [stamps-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stamps from stamps repo
        uses: actions/checkout@v4
        with:
          repository: Happynico7504/spotify-wiiu-miiverse-stamps
          path: _stamps-source

      - name: Check for changes
        id: diff
        run: |
          if diff -rq --include='*.png' _stamps-source/ content/stamps/ > /dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync stamps
        if: steps.diff.outputs.changed == 'true'
        run: |
          cp _stamps-source/*.png content/stamps/

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/stamps/
          git commit -m "chore(stamps): sync from spotify-wiiu-miiverse-stamps"
          git push
